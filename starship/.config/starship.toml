# Starship prompt configuration
# Docs: https://starship.rs/config/

command_timeout = 500

# =============================================================================
# Format
# =============================================================================
# Two-line prompt: info on first line, character on second
# Time is right-aligned using $fill
format = """
$username\
[@](bold white)\
$hostname\
[ in ](white)\
$directory\
$git_branch\
$git_status\
$python\
$ruby\
$nodejs\
$rust\
$golang\
$conda\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

# =============================================================================
# Fill (pushes time to right)
# =============================================================================
[fill]
symbol = " "

# =============================================================================
# Time (right side)
# =============================================================================
[time]
disabled = false
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M"

# =============================================================================
# User & Host
# =============================================================================
[username]
show_always = true
format = "[$user]($style)"
style_user = "bold green"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "bold green"
trim_at = "."
# This shows "yukibot" from "yukibot.local"
# To show "yuki-bot", set your hostname: sudo scutil --set HostName yuki-bot

# =============================================================================
# Directory
# =============================================================================
[directory]
truncation_length = 1
truncate_to_repo = false
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style)"

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = " "
style = "bold purple"
format = "[ $symbol$branch]($style)"

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style)"
conflicted = " "
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
untracked = " ?${count}"
stashed = " \$${count}"
modified = " !${count}"
staged = " +${count}"
renamed = " »${count}"
deleted = " ✘${count}"

# =============================================================================
# Languages (only show when detected in directory)
# =============================================================================
[python]
symbol = " "
style = "yellow"
format = "[ $symbol$version]($style)"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", ".python-version"]
detect_extensions = ["py"]

[ruby]
symbol = " "
style = "red"
format = "[ $symbol$version]($style)"
# Only shows when .ruby-version, Gemfile, etc. detected
detect_files = [".ruby-version", "Gemfile", ".rvmrc"]
detect_extensions = ["rb"]
detect_variables = []

[nodejs]
symbol = " "
style = "green"
format = "[ $symbol$version]($style)"

[rust]
symbol = " "
style = "red"
format = "[ $symbol$version]($style)"

[golang]
symbol = " "
style = "cyan"
format = "[ $symbol$version]($style)"

# =============================================================================
# Conda/Pixi (shows active environment)
# =============================================================================
[conda]
symbol = " "
style = "green"
format = "[ $symbol$environment]($style)"
ignore_base = false

# =============================================================================
# Command Duration
# =============================================================================
[cmd_duration]
min_time = 2000
format = "[ took $duration]($style)"
style = "bold yellow"

# =============================================================================
# Prompt Character
# =============================================================================
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
