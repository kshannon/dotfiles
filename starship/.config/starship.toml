# Starship prompt configuration
# Docs: https://starship.rs/config/

command_timeout = 500

# =============================================================================
# Format
# =============================================================================
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$ruby\
$nodejs\
$rust\
$golang\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

# =============================================================================
# Fill (pushes time to right)
# =============================================================================
[fill]
symbol = " "

# =============================================================================
# Time (right side)
# =============================================================================
[time]
disabled = false
format = "[$time]($style)"
style = "dimmed white"
time_format = "%H:%M"

# =============================================================================
# User & Host (hidden when local)
# =============================================================================
[username]
show_always = false
format = "[$user]($style) "

[hostname]
ssh_only = true
format = "on [$hostname]($style) "

# =============================================================================
# Directory
# =============================================================================
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# =============================================================================
# Languages
# =============================================================================
[python]
symbol = " "
style = "yellow"

[ruby]
symbol = " "
style = "red"

[nodejs]
symbol = " "
style = "green"

[rust]
symbol = " "
style = "red"

[golang]
symbol = " "
style = "cyan"

# =============================================================================
# Command Duration
# =============================================================================
[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow)"

# =============================================================================
# Prompt Character
# =============================================================================
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# =============================================================================
# Disabled modules
# =============================================================================
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
